<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎂 ¡Feliz Cumpleaños!</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --pink:   #FF6B9D;
      --yellow: #FFD93D;
      --blue:   #4ECDC4;
      --purple: #C77DFF;
      --orange: #FF9A3C;
      --bg:     #FFF5F9;
      --card:   #FFFFFF;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
    }

    /* ── CONFETTI CANVAS ── */
    #confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 100;
    }

    /* ── CARD ── */
    .card {
      background: var(--card);
      border-radius: 32px;
      padding: 40px 36px 44px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 12px 48px rgba(255,107,157,.18), 0 2px 8px rgba(0,0,0,.06);
      position: relative;
      animation: popIn .7s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes popIn {
      from { opacity:0; transform:scale(.8) translateY(30px); }
      to   { opacity:1; transform:scale(1)  translateY(0);    }
    }

    /* ── BALLOONS ── */
    .balloons {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    .balloon {
      font-size: 2.6rem;
      animation: float 3s ease-in-out infinite;
      display: inline-block;
    }
    .balloon:nth-child(2) { animation-delay: .4s; }
    .balloon:nth-child(3) { animation-delay: .8s; }
    @keyframes float {
      0%,100% { transform: translateY(0)   rotate(-4deg); }
      50%      { transform: translateY(-14px) rotate(4deg); }
    }

    /* ── TITLE ── */
    h1 {
      font-family: 'Pacifico', cursive;
      font-size: clamp(1.8rem, 6vw, 2.6rem);
      text-align: center;
      background: linear-gradient(135deg, var(--pink), var(--purple), var(--orange));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
      margin-bottom: 4px;
    }

    .subtitle {
      text-align: center;
      font-size: .95rem;
      color: #aaa;
      margin-bottom: 28px;
      letter-spacing: .02em;
    }

    /* ── CAKE ── */
    .cake { text-align: center; font-size: 4rem; margin-bottom: 24px; animation: wiggle 2s ease-in-out infinite; }
    @keyframes wiggle {
      0%,100% { transform: rotate(0);    }
      20%      { transform: rotate(-8deg);}
      40%      { transform: rotate(8deg); }
      60%      { transform: rotate(-4deg);}
      80%      { transform: rotate(4deg); }
    }

    /* ── NAME FIELD ── */
    .field-label {
      font-size: .82rem;
      font-weight: 800;
      color: var(--purple);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 6px;
    }
    .name-input {
      width: 100%;
      padding: 12px 18px;
      border: 3px solid #F0D0FF;
      border-radius: 16px;
      font-family: 'Nunito', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: #444;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      background: #FDFAFF;
      margin-bottom: 20px;
    }
    .name-input:focus {
      border-color: var(--purple);
      box-shadow: 0 0 0 4px rgba(199,125,255,.15);
    }

    /* ── MESSAGE FIELD ── */
    .message-textarea {
      width: 100%;
      padding: 12px 18px;
      border: 3px solid #FFD6E8;
      border-radius: 16px;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: #444;
      outline: none;
      resize: vertical;
      min-height: 110px;
      transition: border-color .2s, box-shadow .2s;
      background: #FFFAFC;
      margin-bottom: 24px;
    }
    .message-textarea:focus {
      border-color: var(--pink);
      box-shadow: 0 0 0 4px rgba(255,107,157,.12);
    }

    /* ── BUTTON ── */
    .btn-reveal {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 18px;
      font-family: 'Pacifico', cursive;
      font-size: 1.2rem;
      cursor: pointer;
      background: linear-gradient(135deg, var(--pink) 0%, var(--purple) 100%);
      color: #fff;
      box-shadow: 0 6px 20px rgba(255,107,157,.40);
      transition: transform .15s, box-shadow .15s;
      letter-spacing: .03em;
    }
    .btn-reveal:hover  { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(255,107,157,.45); }
    .btn-reveal:active { transform: translateY(0);    box-shadow: 0 4px 12px rgba(255,107,157,.30); }

    /* ── RESULT CARD ── */
    .result {
      display: none;
      margin-top: 32px;
      padding: 28px 24px 32px;
      border-radius: 24px;
      background: linear-gradient(135deg, #FFF0F8 0%, #F5EEFF 100%);
      border: 3px solid #F5DAFF;
      text-align: center;
      animation: slideUp .5s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes slideUp {
      from { opacity:0; transform:translateY(24px); }
      to   { opacity:1; transform:translateY(0);    }
    }
    .result.show { display: block; }

    .result-greeting {
      font-family: 'Pacifico', cursive;
      font-size: clamp(1.4rem, 5vw, 2rem);
      background: linear-gradient(135deg, var(--pink), var(--orange));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
    }

    .result-message {
      font-size: 1.05rem;
      color: #555;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .result-emojis {
      font-size: 2rem;
      margin-top: 16px;
      animation: bounce .8s ease-in-out infinite alternate;
    }
    @keyframes bounce {
      from { transform: scale(1);    }
      to   { transform: scale(1.15); }
    }

    /* ── RESET BTN ── */
    .btn-reset {
      margin-top: 18px;
      background: none;
      border: 2.5px solid var(--blue);
      color: var(--blue);
      border-radius: 14px;
      padding: 10px 28px;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: .95rem;
      cursor: pointer;
      transition: background .2s, color .2s;
    }
    .btn-reset:hover { background: var(--blue); color: #fff; }

    /* ── DECORATIVE DOTS ── */
    .dots {
      position: absolute;
      pointer-events: none;
    }
    .dot {
      width: 14px; height: 14px;
      border-radius: 50%;
      position: absolute;
      opacity: .35;
    }
  </style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<div class="card" id="main-card">

  <!-- Decorative dots -->
  <div class="dots">
    <div class="dot" style="background:var(--yellow);top:-8px;left:28px;"></div>
    <div class="dot" style="background:var(--pink);top:12px;right:-6px;width:10px;height:10px;"></div>
    <div class="dot" style="background:var(--blue);bottom:20px;left:-5px;width:18px;height:18px;"></div>
    <div class="dot" style="background:var(--orange);bottom:-7px;right:40px;"></div>
  </div>

  <div class="balloons">
    <span class="balloon">🎈</span>
    <span class="balloon">🎉</span>
    <span class="balloon">🎈</span>
  </div>

  <h1>¡Feliz Cumpleaños!</h1>
  <p class="subtitle">Crea una tarjeta personalizada ✨</p>

  <div class="cake">🎂</div>

  <!-- FORM -->
  <div id="form-section">
    <p class="field-label">Nombre de la cumpleañera</p>
    <input
      id="name-input"
      class="name-input"
      type="text"
      placeholder="🌸"
      maxlength="40"
    />

    <p class="field-label">Mensaje secreto 🔒</p>
    <textarea
      id="message-input"
      class="message-textarea"
      placeholder="Escribe aquí ese mensaje especial que solo ella verá al presionar el botón..."
    ></textarea>

    <button class="btn-reveal" onclick="revelarMensaje()">
      🎁 ¡Revelar mensaje!
    </button>
  </div>

  <!-- RESULT -->
  <div class="result" id="result-section">
    <div class="result-greeting" id="result-greeting"></div>
    <p class="result-message" id="result-message"></p>
    <div class="result-emojis">🌟🎀💖🌟</div>
    <br/>
    <button class="btn-reset" onclick="resetCard()">✏️ Editar tarjeta</button>
  </div>

</div>

<script>
  /* ────────── CONFETTI ────────── */
  const canvas = document.getElementById('confetti-canvas');
  const ctx    = canvas.getContext('2d');
  let pieces   = [];
  let running  = false;
  let animId;

  const COLORS = ['#FF6B9D','#FFD93D','#4ECDC4','#C77DFF','#FF9A3C','#6BFF9D','#FF6B6B'];

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  function spawnConfetti(n = 220) {
    for (let i = 0; i < n; i++) {
      pieces.push({
        x:     Math.random() * canvas.width,
        y:     Math.random() * canvas.height * -.6 - 20,
        w:     6 + Math.random() * 10,
        h:     4 + Math.random() * 7,
        color: COLORS[Math.floor(Math.random() * COLORS.length)],
        rot:   Math.random() * 360,
        vx:    (Math.random() - .5) * 3.5,
        vy:    2.5 + Math.random() * 4,
        vr:    (Math.random() - .5) * 8,
        alpha: 1,
        shape: Math.random() > .5 ? 'rect' : 'circle',
      });
    }
  }

  function drawLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces = pieces.filter(p => p.alpha > 0.01);

    pieces.forEach(p => {
      p.x  += p.vx;
      p.y  += p.vy;
      p.rot+= p.vr;
      p.vy += 0.08; // gravity
      if (p.y > canvas.height * .85) p.alpha -= 0.025;

      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot * Math.PI / 180);
      ctx.fillStyle = p.color;

      if (p.shape === 'circle') {
        ctx.beginPath();
        ctx.arc(0, 0, p.w / 2, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      }
      ctx.restore();
    });

    if (pieces.length > 0) animId = requestAnimationFrame(drawLoop);
    else { running = false; ctx.clearRect(0, 0, canvas.width, canvas.height); }
  }

  function launchConfetti() {
    if (running) cancelAnimationFrame(animId);
    pieces = [];
    spawnConfetti(260);
    running = true;
    drawLoop();
    // Second burst
    setTimeout(() => spawnConfetti(150), 600);
  }

  /* ────────── REVEAL LOGIC ────────── */
  function revelarMensaje() {
    const name = document.getElementById('name-input').value.trim();
    const msg  = document.getElementById('message-input').value.trim();

    if (!name) {
      shakeInput('name-input');
      return;
    }
    if (!msg) {
      shakeInput('message-input');
      return;
    }

    document.getElementById('result-greeting').textContent =
      `¡Feliz cumpleaños, ${name}! 🎂`;
    document.getElementById('result-message').textContent = msg;

    document.getElementById('form-section').style.display   = 'none';
    const res = document.getElementById('result-section');
    res.classList.add('show');

    launchConfetti();
  }

  function resetCard() {
    document.getElementById('result-section').classList.remove('show');
    document.getElementById('form-section').style.display = 'block';
    document.getElementById('result-section').style.display = '';
  }

  function shakeInput(id) {
    const el = document.getElementById(id);
    el.style.animation = 'none';
    el.style.borderColor = '#FF4C4C';
    el.style.boxShadow  = '0 0 0 4px rgba(255,76,76,.15)';
    el.focus();
    // CSS shake keyframe inline
    el.animate([
      { transform:'translateX(0)'   },
      { transform:'translateX(-8px)'},
      { transform:'translateX(8px)' },
      { transform:'translateX(-5px)'},
      { transform:'translateX(5px)' },
      { transform:'translateX(0)'   },
    ], { duration: 380, easing:'ease-in-out' });
    setTimeout(() => {
      el.style.borderColor = '';
      el.style.boxShadow   = '';
    }, 1500);
  }
</script>
</body>
</html>
